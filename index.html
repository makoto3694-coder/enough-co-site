<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enough & co., ltd.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="fixed-header" aria-label="Global navigation">
    <div class="header-board">
      <img src="assets/fixed-header.png" alt="">
      <nav class="hotspots header-hotspots">
        <a class="hotspot logo-link" href="#home" aria-label="HOME"></a>
        <a class="hotspot nav-about" href="#about" aria-label="ABOUT"></a>
        <a class="hotspot nav-business" href="#business" aria-label="BUSINESS"></a>
        <a class="hotspot nav-portfolio" href="#portfolio" aria-label="PORTFOLIO"></a>
        <a class="hotspot nav-history" href="#history" aria-label="HISTORY"></a>
        <a class="hotspot nav-ceo" href="#ceo" aria-label="CEO"></a>
        <a class="hotspot nav-company" href="#company" aria-label="COMPANY"></a>
        <a class="hotspot nav-news" href="#news" aria-label="NEWS"></a>
        <a class="hotspot nav-contact" href="#contact" aria-label="CONTACT"></a>
      </nav>
    </div>
  </header>

  <main class="site-pages" aria-label="Enough & co., ltd. website preview">
    <section id="home" class="page-frame">
      <div class="artboard">
        <span id="about" class="anchor-marker top-anchor"></span>
        <span id="business" class="anchor-marker business-anchor"></span>
        <img src="assets/page-01-home-body.png" alt="Enough & co., ltd. トップページ">
        <nav class="hotspots" aria-label="トップページ内リンク">
          <a class="hotspot home-scroll" href="#portfolio" aria-label="SCROLL DOWN"></a>
          <a class="hotspot exit-read" href="#history" aria-label="EXIT HISTORY READ MORE"></a>
          <a class="hotspot business-investment" href="#portfolio" aria-label="INVESTMENT"></a>
          <a class="hotspot business-development" href="#portfolio" aria-label="BUSINESS DEVELOPMENT"></a>
          <a class="hotspot business-ma" href="#portfolio" aria-label="M&A"></a>
          <a class="hotspot business-consulting" href="#portfolio" aria-label="CONSULTING"></a>
        </nav>
      </div>
    </section>

    <section id="portfolio" class="page-frame">
      <div class="artboard">
        <span id="ceo" class="anchor-marker ceo-anchor"></span>
        <img src="assets/page-02-portfolio-body.png" alt="Enough & co., ltd. PORTFOLIOページ">
        <svg class="portfolio-exit-svg" viewBox="0 0 1536 942" aria-hidden="true">
          <text x="277" y="491">2017.12　株式譲渡</text>
          <text x="638" y="491">2017.12　株式譲渡</text>
          <text x="1003" y="491">2017.12　株式譲渡</text>
          <text x="1355" y="491">2022.12　事業譲渡</text>
        </svg>
        <nav class="hotspots" aria-label="ポートフォリオページ内リンク">
          <a class="hotspot portfolio-view" href="#history" aria-label="VIEW ALL"></a>
          <a class="hotspot portfolio-card-1" href="#portfolio" aria-label="APPAREL FASHION"></a>
          <a class="hotspot portfolio-card-2" href="#portfolio" aria-label="SNEAKERS FOOTWEAR"></a>
          <a class="hotspot portfolio-card-3" href="#portfolio" aria-label="SHOE CARE MAINTENANCE"></a>
          <a class="hotspot portfolio-card-4" href="#portfolio" aria-label="RESTAURANT BUSINESS"></a>
          <a class="hotspot ceo-read" href="#company" aria-label="CEO MESSAGE READ MORE"></a>
        </nav>
      </div>
    </section>

    <section id="history-company-contact" class="page-frame page-square">
      <div class="artboard company-board">
        <span id="history" class="anchor-marker top-anchor"></span>
        <span id="company" class="anchor-marker company-anchor"></span>
        <img src="assets/page-03-history-company.png" alt="Enough & co., ltd. HISTORY COMPANYページ">
        <nav class="hotspots" aria-label="会社情報ページ内リンク">
          <a class="hotspot history-view" href="#home" aria-label="VIEW ALL"></a>
          <a class="hotspot company-view" href="#news" aria-label="VIEW MORE"></a>
        </nav>
      </div>

      <section id="news" class="news-section">
        <div class="news-head">
          <h2>NEWS</h2>
          <span></span>
        </div>
        <div class="news-list" aria-label="News list">
          <a href="#contact"><time datetime="2018-02-15">2018.02.15</time><strong>Enough &amp; Co., Ltd. コーポレートサイトを公開しました。</strong></a>
          <a href="#portfolio"><time datetime="2019-12-31">2019.12.31</time><strong>東京都中央区　ファストフード店舗　事業買収が完了しました。</strong></a>
          <a href="#portfolio"><time datetime="2022-12-28">2022.12.28</time><strong>東京都世田谷区　カフェ店舗　事業売却が完了しました。</strong></a>
          <a href="#portfolio"><time datetime="2023-01-20">2023.1.20</time><strong>東京都品川区　レストランバー店舗　事業売却が完了しました。</strong></a>
          <a href="#portfolio"><time datetime="2023-01-31">2023.1.31</time><strong>東京都中央区　ファストフード店舗　事業売却が完了しました。</strong></a>
          <a href="#company"><time datetime="2025-11-08">2025.11.8</time><strong>東京都大田区　不動産物件取得しました。</strong></a>
          <a href="#company"><time datetime="2025-11-27">2025.11.27</time><strong>千葉県君津市　不動産物件取得しました。</strong></a>
          <a href="#company"><time datetime="2026-02-01">2026.2.1</time><strong>沖縄県今帰仁村　旅館業開業しました。</strong></a>
        </div>
      </section>

      <div class="artboard contact-board">
        <span id="contact" class="anchor-marker top-anchor"></span>
        <img src="assets/page-03-contact-footer.png" alt="Enough & co., ltd. CONTACTページ">
        <span class="contact-name-label">お名前</span>
        <nav class="hotspots" aria-label="フッターナビゲーション">
          <a class="hotspot contact-view" href="#contact" aria-label="VIEW MORE"></a>
          <a class="hotspot footer-about" href="#about" aria-label="ABOUT"></a>
          <a class="hotspot footer-business" href="#business" aria-label="BUSINESS"></a>
          <a class="hotspot footer-portfolio" href="#portfolio" aria-label="PORTFOLIO"></a>
          <a class="hotspot footer-history" href="#history" aria-label="HISTORY"></a>
          <a class="hotspot footer-ceo" href="#ceo" aria-label="CEO"></a>
          <a class="hotspot footer-company" href="#company" aria-label="COMPANY"></a>
          <a class="hotspot footer-news" href="#news" aria-label="NEWS"></a>
          <a class="hotspot footer-contact" href="#contact" aria-label="CONTACT"></a>
        </nav>
        <form id="contact-form" class="contact-overlay" aria-label="お問い合わせフォーム">
          <label class="visually-hidden" for="name">お名前</label>
          <input id="name" class="field name-field" type="text" name="name" autocomplete="name">
          <label class="visually-hidden" for="company">会社名</label>
          <input id="company" class="field company-field" type="text" name="company" autocomplete="organization">
          <label class="visually-hidden" for="email">メールアドレス</label>
          <input id="email" class="field email-field" type="email" name="email" autocomplete="email">
          <label class="visually-hidden" for="tel">電話番号</label>
          <input id="tel" class="field tel-field" type="tel" name="tel" autocomplete="tel">
          <label class="visually-hidden" for="message">お問い合わせ内容</label>
          <textarea id="message" class="field message-field" name="message"></textarea>
          <button class="send-button" type="submit" aria-label="SEND"></button>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
